name: Bug report
description: Report a defect, regression, broken workflow, or unexpected behavior.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough context for someone new to the codebase to reproduce the issue and understand its impact.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend
        - Backend
        - Shared contracts or schemas
        - Auth or organization flow
        - Policy ingestion or retrieval
        - OCR or AI audit pipeline
        - Infrastructure or setup
        - Documentation
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what should have happened.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what happened instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use a short numbered list.
      placeholder: |
        1. Go to ...
        2. Submit ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected and how severe is it?
      placeholder: Admin-only issue, blocks claim submission, causes incorrect audit result, and so on.

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or API responses
      description: Paste relevant logs or add screenshots if available.
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Example: local, staging, production-like, browser, OS.
      placeholder: local / Windows 11 / Firefox

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      placeholder: Related issue links, suspected files, workarounds, or anything else helpful.
